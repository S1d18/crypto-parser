{% extends "base.html" %}
{% block title %}Strategy — {{ strategy_id }}{% endblock %}

{% block content %}
<div class="strategy-header">
    <a href="/" class="back-link">&larr; All Strategies</a>
    <h1 id="strategy-title">{{ strategy_id }}</h1>
    <div class="strategy-meta" id="strategy-meta"></div>
</div>

<!-- Open Position Banner -->
<div id="open-position-banner" class="open-position-banner" style="display:none;"></div>

<!-- Stats cards -->
<div class="stats-grid" id="stats-grid"></div>

<!-- Chart -->
<div class="chart-section">
    <h2>Price Chart</h2>
    <div id="chart-container" style="height: 400px;"></div>
</div>

<!-- Equity curve -->
<div class="chart-section">
    <h2>Equity Curve</h2>
    <div id="equity-container" style="height: 250px;"></div>
</div>

<!-- Trades table -->
<div class="trades-section">
    <h2>Trade History</h2>
    <table class="strat-table" id="trades-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Opened</th>
                <th>Closed</th>
                <th>Duration</th>
                <th>Side</th>
                <th>Entry</th>
                <th>SL</th>
                <th>Exit</th>
                <th>Qty</th>
                <th>PnL</th>
                <th>PnL%</th>
                <th>Reason</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const STRATEGY_ID = '{{ strategy_id }}';

function fmtPrice(v) {
    if (v === null || v === undefined) return '-';
    if (v >= 1000) return v.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    return v.toFixed(2);
}

function fmtPnl(v, dec = 2) {
    if (v === null || v === undefined) return '-';
    return (v >= 0 ? '+' : '') + v.toFixed(dec);
}

function fmtDuration(openedAt, closedAt) {
    if (!openedAt) return '-';
    const start = new Date(openedAt);
    const end = closedAt ? new Date(closedAt) : new Date();
    const diffMs = end - start;
    const totalMin = Math.floor(diffMs / 60000);
    const days = Math.floor(totalMin / 1440);
    const hours = Math.floor((totalMin % 1440) / 60);
    const mins = totalMin % 60;
    if (days > 0) return `${days}d ${hours}h ${mins}m`;
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
}

function fmtDateShort(isoStr) {
    if (!isoStr) return '-';
    const d = new Date(isoStr);
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${mo}-${dd} ${hh}:${mm}`;
}

// --- Open Position Banner ---
function renderOpenPosition(stats) {
    const banner = document.getElementById('open-position-banner');
    if (!stats.has_open_position || !stats.open_trade) {
        banner.style.display = 'none';
        return;
    }
    banner.style.display = 'block';
    const ot = stats.open_trade;
    const sideLabel = ot.side === 'buy' ? 'LONG' : 'SHORT';
    const sideClass = ot.side === 'buy' ? 'pos-long' : 'pos-short';
    const upnl = stats.open_pnl_live;
    const upnlPct = stats.open_pnl_live_pct;
    const upnlClass = upnl !== null ? (upnl >= 0 ? 'positive' : 'negative') : '';
    const currentPrice = stats.current_price;
    const holdTime = fmtDuration(ot.opened_at, null);
    const vb = stats.config.virtual_balance;

    // Distance to SL
    let slDist = '-';
    if (ot.sl_price && currentPrice) {
        const dist = ot.side === 'buy'
            ? ((currentPrice - ot.sl_price) / currentPrice * 100)
            : ((ot.sl_price - currentPrice) / currentPrice * 100);
        slDist = dist.toFixed(2) + '%';
    }

    banner.innerHTML = `
        <div class="op-header">
            <span class="pos-badge ${sideClass}">${sideLabel}</span>
            <span class="op-title">Open Position</span>
            <span class="op-hold">${holdTime}</span>
        </div>
        <div class="op-grid">
            <div class="op-item">
                <span class="op-label">Entry Price</span>
                <span class="op-value">${fmtPrice(ot.entry_price)}</span>
            </div>
            <div class="op-item">
                <span class="op-label">Current Price</span>
                <span class="op-value">${fmtPrice(currentPrice)}</span>
            </div>
            <div class="op-item">
                <span class="op-label">SL Price</span>
                <span class="op-value">${fmtPrice(ot.sl_price)}</span>
            </div>
            <div class="op-item">
                <span class="op-label">Dist to SL</span>
                <span class="op-value">${slDist}</span>
            </div>
            <div class="op-item">
                <span class="op-label">Entry Size</span>
                <span class="op-value">$${vb ? vb.toLocaleString() : '-'}</span>
            </div>
            <div class="op-item">
                <span class="op-label">Qty</span>
                <span class="op-value">${ot.qty ? ot.qty.toFixed(5) : '-'}</span>
            </div>
            <div class="op-item">
                <span class="op-label">Unrealized PnL</span>
                <span class="op-value ${upnlClass}">${upnl !== null ? fmtPnl(upnl) : '-'}</span>
            </div>
            <div class="op-item">
                <span class="op-label">uPnL %</span>
                <span class="op-value ${upnlClass}">${upnlPct !== null ? fmtPnl(upnlPct) + '%' : '-'}</span>
            </div>
        </div>
    `;
}

// --- Stats ---
function renderStats(stats) {
    const meta = document.getElementById('strategy-meta');
    const c = stats.config;
    meta.innerHTML = `
        <span class="meta-badge">${c.group}</span>
        <span class="meta-badge">${c.timeframe}</span>
        <span class="meta-badge dir-badge-${c.direction}">${c.direction.toUpperCase()}</span>
        <span class="meta-badge">ST(${c.st_period}, ${c.st_multiplier})</span>
        <span class="meta-badge">SL ${c.sl_percent}%</span>
        <span class="meta-badge">$${c.virtual_balance ? c.virtual_balance.toLocaleString() : '10,000'}</span>
    `;

    const grid = document.getElementById('stats-grid');
    const noTrades = stats.total === 0;

    const cards = [
        { label: 'Total Trades', value: noTrades ? '-' : stats.total, cls: '' },
        { label: 'Wins / Losses', value: noTrades ? '-' : `${stats.wins} / ${stats.losses}`, cls: '' },
        { label: 'Win Rate', value: noTrades ? '-' : `${stats.win_rate}%`, cls: noTrades ? '' : (stats.win_rate >= 50 ? 'positive' : 'negative') },
        { label: 'Profit Factor', value: noTrades ? '-' : (stats.profit_factor === Infinity ? '∞' : stats.profit_factor.toFixed(2)), cls: noTrades ? '' : (stats.profit_factor >= 1 ? 'positive' : 'negative') },
        { label: 'Total PnL', value: noTrades ? '-' : `${fmtPnl(stats.total_pnl)}`, cls: noTrades ? '' : (stats.total_pnl >= 0 ? 'positive' : 'negative') },
        { label: 'Total PnL %', value: noTrades ? '-' : `${fmtPnl(stats.total_pnl_pct)}%`, cls: noTrades ? '' : (stats.total_pnl_pct >= 0 ? 'positive' : 'negative') },
        { label: 'Max Drawdown', value: noTrades ? '-' : `-${stats.max_drawdown.toFixed(2)}`, cls: noTrades ? '' : 'negative' },
        { label: 'Sharpe Ratio', value: noTrades ? '-' : stats.sharpe.toFixed(2), cls: noTrades ? '' : (stats.sharpe >= 0 ? 'positive' : 'negative') },
        { label: 'Avg Win', value: noTrades ? '-' : `+${stats.avg_win.toFixed(2)}`, cls: noTrades ? '' : 'positive' },
        { label: 'Avg Loss', value: noTrades ? '-' : `${stats.avg_loss.toFixed(2)}`, cls: noTrades ? '' : 'negative' },
        { label: 'Expectancy', value: noTrades ? '-' : stats.expectancy.toFixed(2), cls: noTrades ? '' : (stats.expectancy >= 0 ? 'positive' : 'negative') },
        { label: 'Consec W / L', value: noTrades ? '-' : `${stats.max_consec_wins} / ${stats.max_consec_losses}`, cls: '' },
        { label: 'Avg PnL', value: noTrades ? '-' : fmtPnl(stats.avg_pnl), cls: noTrades ? '' : (stats.avg_pnl >= 0 ? 'positive' : 'negative') },
        { label: 'SL Hits', value: noTrades ? '-' : `${stats.sl_hits} (${stats.total > 0 ? (stats.sl_hits / stats.total * 100).toFixed(0) : 0}%)`, cls: '' },
    ];

    grid.innerHTML = cards.map(c => `
        <div class="stat-card">
            <div class="stat-label">${c.label}</div>
            <div class="stat-value ${c.cls}">${c.value}</div>
        </div>
    `).join('');
}

// --- Price Chart ---
let priceChart = null;
let candleSeries = null;

function renderPriceChart(candles, trades, openTrade) {
    const container = document.getElementById('chart-container');
    if (priceChart) {
        priceChart.remove();
    }
    priceChart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: false },
        width: container.clientWidth,
        height: 400,
    });

    candleSeries = priceChart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350',
        borderUpColor: '#26a69a', borderDownColor: '#ef5350',
        wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });
    candleSeries.setData(candles);

    // Маркеры сделок
    const markers = [];
    if (trades && trades.length > 0) {
        trades.forEach(t => {
            if (t.opened_at) {
                const ts = Math.floor(new Date(t.opened_at).getTime() / 1000);
                markers.push({
                    time: ts,
                    position: t.side === 'buy' ? 'belowBar' : 'aboveBar',
                    color: t.side === 'buy' ? '#26a69a' : '#ef5350',
                    shape: t.side === 'buy' ? 'arrowUp' : 'arrowDown',
                    text: `${t.side.toUpperCase()} @ ${t.entry_price.toFixed(0)}`,
                });
            }
            if (t.closed_at && t.close_price) {
                const ts = Math.floor(new Date(t.closed_at).getTime() / 1000);
                const pnlSign = (t.pnl || 0) >= 0 ? '+' : '';
                markers.push({
                    time: ts,
                    position: t.side === 'buy' ? 'aboveBar' : 'belowBar',
                    color: (t.pnl || 0) >= 0 ? '#26a69a' : '#ef5350',
                    shape: 'circle',
                    text: `${t.close_reason} ${pnlSign}${(t.pnl || 0).toFixed(1)}`,
                });
            }
        });
    }
    // Open trade marker
    if (openTrade && openTrade.opened_at) {
        const ts = Math.floor(new Date(openTrade.opened_at).getTime() / 1000);
        markers.push({
            time: ts,
            position: openTrade.side === 'buy' ? 'belowBar' : 'aboveBar',
            color: '#2196f3',
            shape: openTrade.side === 'buy' ? 'arrowUp' : 'arrowDown',
            text: `OPEN @ ${openTrade.entry_price.toFixed(0)}`,
        });
    }

    markers.sort((a, b) => a.time - b.time);
    if (markers.length > 0) {
        candleSeries.setMarkers(markers);
    }

    // SL price line for open position
    if (openTrade && openTrade.sl_price) {
        candleSeries.createPriceLine({
            price: openTrade.sl_price,
            color: '#ef5350',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: 'SL',
        });
    }
    // Entry price line for open position
    if (openTrade && openTrade.entry_price) {
        candleSeries.createPriceLine({
            price: openTrade.entry_price,
            color: '#2196f3',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dotted,
            axisLabelVisible: true,
            title: 'Entry',
        });
    }

    priceChart.timeScale().fitContent();

    new ResizeObserver(() => {
        priceChart.applyOptions({ width: container.clientWidth });
    }).observe(container);
}

// --- Equity ---
let equityChart = null;

function renderEquityChart(curve) {
    const container = document.getElementById('equity-container');
    if (equityChart) {
        equityChart.remove();
    }
    if (!curve || curve.length === 0) {
        container.innerHTML = '<div class="no-data">No trades yet</div>';
        return;
    }
    equityChart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
        timeScale: { timeVisible: true },
        width: container.clientWidth,
        height: 250,
    });

    const lastVal = curve[curve.length - 1].value;
    const isProfit = lastVal >= 0;

    const series = equityChart.addAreaSeries({
        topColor: isProfit ? 'rgba(38, 166, 154, 0.4)' : 'rgba(239, 83, 80, 0.4)',
        bottomColor: isProfit ? 'rgba(38, 166, 154, 0.0)' : 'rgba(239, 83, 80, 0.0)',
        lineColor: isProfit ? '#26a69a' : '#ef5350',
        lineWidth: 2,
    });

    const data = curve.map(p => ({
        time: Math.floor(new Date(p.time).getTime() / 1000),
        value: p.value,
    }));
    series.setData(data);

    // Zero line
    series.createPriceLine({
        price: 0,
        color: '#787b86',
        lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        axisLabelVisible: false,
    });

    equityChart.timeScale().fitContent();

    new ResizeObserver(() => {
        equityChart.applyOptions({ width: container.clientWidth });
    }).observe(container);
}

// --- Trades table ---
function renderTrades(trades, openTrade, openPnl, openPnlPct) {
    const tbody = document.querySelector('#trades-table tbody');

    let rows = '';

    // Открытая позиция — первая строка
    if (openTrade) {
        const sideClass = openTrade.side === 'buy' ? 'dir-long' : 'dir-short';
        const sideLabel = openTrade.side === 'buy' ? 'LONG' : 'SHORT';
        const duration = fmtDuration(openTrade.opened_at, null);
        const upnlClass = openPnl !== null ? (openPnl >= 0 ? 'positive' : 'negative') : '';
        rows += `
            <tr class="row-in-position">
                <td><span class="reason-badge reason-open">OPEN</span></td>
                <td>${fmtDateShort(openTrade.opened_at)}</td>
                <td>-</td>
                <td class="hold-time">${duration}</td>
                <td class="${sideClass}">${sideLabel}</td>
                <td>${fmtPrice(openTrade.entry_price)}</td>
                <td>${fmtPrice(openTrade.sl_price)}</td>
                <td>-</td>
                <td>${openTrade.qty ? openTrade.qty.toFixed(5) : '-'}</td>
                <td class="${upnlClass}">${openPnl !== null ? fmtPnl(openPnl) : '-'}</td>
                <td class="${upnlClass}">${openPnlPct !== null ? fmtPnl(openPnlPct) + '%' : '-'}</td>
                <td><span class="reason-badge reason-open">active</span></td>
            </tr>
        `;
    }

    if ((!trades || trades.length === 0) && !openTrade) {
        tbody.innerHTML = '<tr><td colspan="12" class="no-data">No trades yet</td></tr>';
        return;
    }

    // Закрытые сделки
    if (trades && trades.length > 0) {
        rows += trades.map((t, i) => {
            const pnlClass = (t.pnl || 0) >= 0 ? 'positive' : 'negative';
            const sideClass = t.side === 'buy' ? 'dir-long' : 'dir-short';
            const sideLabel = t.side === 'buy' ? 'LONG' : 'SHORT';
            const reasonClass = t.close_reason === 'sl_hit' ? 'reason-sl' : 'reason-signal';
            const duration = fmtDuration(t.opened_at, t.closed_at);
            return `
                <tr>
                    <td>${trades.length - i}</td>
                    <td>${fmtDateShort(t.opened_at)}</td>
                    <td>${fmtDateShort(t.closed_at)}</td>
                    <td class="hold-time">${duration}</td>
                    <td class="${sideClass}">${sideLabel}</td>
                    <td>${fmtPrice(t.entry_price)}</td>
                    <td>${fmtPrice(t.sl_price)}</td>
                    <td>${fmtPrice(t.close_price)}</td>
                    <td>${t.qty ? t.qty.toFixed(5) : '-'}</td>
                    <td class="${pnlClass}">${fmtPnl(t.pnl || 0)}</td>
                    <td class="${pnlClass}">${fmtPnl(t.pnl_pct || 0)}%</td>
                    <td><span class="reason-badge ${reasonClass}">${t.close_reason || '-'}</span></td>
                </tr>
            `;
        }).join('');
    }

    tbody.innerHTML = rows;
}

// --- Load all data ---
async function loadAll() {
    try {
        const [statsRes, tradesRes, equityRes] = await Promise.all([
            fetch(`/api/strategy/${STRATEGY_ID}/stats`),
            fetch(`/api/strategy/${STRATEGY_ID}/trades`),
            fetch(`/api/strategy/${STRATEGY_ID}/equity`),
        ]);
        const stats = await statsRes.json();
        const trades = await tradesRes.json();
        const equity = await equityRes.json();

        renderStats(stats);
        renderOpenPosition(stats);
        renderTrades(trades, stats.open_trade, stats.open_pnl_live, stats.open_pnl_live_pct);
        renderEquityChart(equity);

        // Загружаем свечи отдельно (может быть медленнее)
        const candlesRes = await fetch(`/api/strategy/${STRATEGY_ID}/candles`);
        const candles = await candlesRes.json();
        if (!candles.error) {
            renderPriceChart(candles, trades, stats.open_trade);
        }
    } catch (e) {
        console.error('Failed to load data:', e);
    }
}

loadAll();
setInterval(loadAll, 60000);
</script>
{% endblock %}
